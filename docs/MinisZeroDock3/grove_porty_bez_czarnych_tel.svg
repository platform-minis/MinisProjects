<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 820" width="800" height="820">
  <title>Obudowa Grove HY2.0 — pełna specyfikacja okablowania</title>
  <desc>Kompletny rysunek 3 portów Grove dla RP2040-Zero, ESP32-S3-Zero, ESP32-C3-Zero</desc>

  <defs>
    <style>
      .title { font: 700 19px sans-serif; fill: #1a1a1a; }
      .subtitle { font: 500 13px sans-serif; fill: #3d3d3d; }
      .port-label { font: 700 15px sans-serif; fill: #1a1a1a; }
      .pin-num { font: 700 11px sans-serif; fill: #1a1a1a; }
      .pin-label { font: 700 12px sans-serif; fill: #1a1a1a; }
      .color-label { font: 600 10px sans-serif; }
      .note { font: 500 11px sans-serif; fill: #555; }
      .section { font: 700 14px sans-serif; fill: #1a1a1a; }
      .cell { font: 600 11px sans-serif; fill: #1a1a1a; }
      .cell-header { font: 700 12px sans-serif; fill: #1a1a1a; }
    </style>
  </defs>

  <!-- ============ NAGŁÓWEK ============ -->
  <text x="400" y="30" text-anchor="middle" class="title">Obudowa z 3 portami Grove HY2.0</text>
  <text x="400" y="52" text-anchor="middle" class="subtitle">Widok od frontu · Standard M5Stack · od lewej: GND · 5V · SIG2 · SIG1</text>

  <!-- ============ SEKCJA 1: RYSUNKI ZŁĄCZY ============ -->
  <rect x="40" y="75" width="720" height="240" rx="14" ry="14"
        fill="#fafafa" stroke="#666" stroke-width="1.5"/>
  <text x="750" y="92" text-anchor="end" class="note">obudowa</text>

  <!-- === PORT 1: UART === -->
  <text x="175" y="118" text-anchor="middle" class="port-label">Port 1 · UART</text>

  <rect x="105" y="136" width="140" height="60" rx="8" ry="8"
        fill="#ffffff" stroke="#666" stroke-width="1.5"/>
  <rect x="115" y="130" width="120" height="8" rx="2" ry="2"
        fill="none" stroke="#666" stroke-width="1.2"/>

  <!-- pin 4 GND - obwódka ciemna szara, białe wnętrze -->
  <circle cx="125" cy="166" r="11" fill="#ffffff" stroke="#444" stroke-width="2.5"/>
  <text x="125" y="170" text-anchor="middle" class="pin-num">4</text>

  <!-- pin 3 czerwony -->
  <circle cx="160" cy="166" r="11" fill="#ffffff" stroke="#d63030" stroke-width="2.5"/>
  <text x="160" y="170" text-anchor="middle" class="pin-num" fill="#8b0000">3</text>

  <!-- pin 2 szary -->
  <circle cx="195" cy="166" r="11" fill="#ffffff" stroke="#888" stroke-width="2.5"/>
  <text x="195" y="170" text-anchor="middle" class="pin-num" fill="#555">2</text>

  <!-- pin 1 żółty -->
  <circle cx="230" cy="166" r="11" fill="#ffffff" stroke="#d49000" stroke-width="2.5"/>
  <text x="230" y="170" text-anchor="middle" class="pin-num" fill="#8b6200">1</text>

  <text x="125" y="216" text-anchor="middle" class="pin-label">GND</text>
  <text x="125" y="232" text-anchor="middle" class="color-label" fill="#444">czarny</text>
  <text x="160" y="216" text-anchor="middle" class="pin-label">5V</text>
  <text x="160" y="232" text-anchor="middle" class="color-label" fill="#8b0000">czerw.</text>
  <text x="195" y="216" text-anchor="middle" class="pin-label">TX</text>
  <text x="195" y="232" text-anchor="middle" class="color-label" fill="#555">szary</text>
  <text x="230" y="216" text-anchor="middle" class="pin-label">RX</text>
  <text x="230" y="232" text-anchor="middle" class="color-label" fill="#8b6200">żółty</text>

  <text x="175" y="260" text-anchor="middle" class="note">R1 → RX · R2 → TX</text>
  <text x="175" y="278" text-anchor="middle" class="note">pin 1 (żółty) po prawej</text>
  <text x="175" y="296" text-anchor="middle" class="note">pin 4 (czarny) przy wycięciu</text>

  <!-- === PORT 2: I2C === -->
  <text x="400" y="118" text-anchor="middle" class="port-label">Port 2 · I2C</text>

  <rect x="330" y="136" width="140" height="60" rx="8" ry="8"
        fill="#ffffff" stroke="#666" stroke-width="1.5"/>
  <rect x="340" y="130" width="120" height="8" rx="2" ry="2"
        fill="none" stroke="#666" stroke-width="1.2"/>

  <circle cx="350" cy="166" r="11" fill="#ffffff" stroke="#444" stroke-width="2.5"/>
  <text x="350" y="170" text-anchor="middle" class="pin-num">4</text>

  <circle cx="385" cy="166" r="11" fill="#ffffff" stroke="#d63030" stroke-width="2.5"/>
  <text x="385" y="170" text-anchor="middle" class="pin-num" fill="#8b0000">3</text>

  <circle cx="420" cy="166" r="11" fill="#ffffff" stroke="#888" stroke-width="2.5"/>
  <text x="420" y="170" text-anchor="middle" class="pin-num" fill="#555">2</text>

  <circle cx="455" cy="166" r="11" fill="#ffffff" stroke="#d49000" stroke-width="2.5"/>
  <text x="455" y="170" text-anchor="middle" class="pin-num" fill="#8b6200">1</text>

  <text x="350" y="216" text-anchor="middle" class="pin-label">GND</text>
  <text x="350" y="232" text-anchor="middle" class="color-label" fill="#444">czarny</text>
  <text x="385" y="216" text-anchor="middle" class="pin-label">5V</text>
  <text x="385" y="232" text-anchor="middle" class="color-label" fill="#8b0000">czerw.</text>
  <text x="420" y="216" text-anchor="middle" class="pin-label">SDA</text>
  <text x="420" y="232" text-anchor="middle" class="color-label" fill="#555">szary</text>
  <text x="455" y="216" text-anchor="middle" class="pin-label">SCL</text>
  <text x="455" y="232" text-anchor="middle" class="color-label" fill="#8b6200">żółty</text>

  <text x="400" y="260" text-anchor="middle" class="note">L8 → SDA · L9 → SCL</text>
  <text x="400" y="278" text-anchor="middle" class="note">zgodny z M5Stack Unit I2C</text>
  <text x="400" y="296" text-anchor="middle" class="note">działa z modułami Grove/Unit</text>

  <!-- === PORT 3: A/D === -->
  <text x="625" y="118" text-anchor="middle" class="port-label">Port 3 · A/D</text>

  <rect x="555" y="136" width="140" height="60" rx="8" ry="8"
        fill="#ffffff" stroke="#666" stroke-width="1.5"/>
  <rect x="565" y="130" width="120" height="8" rx="2" ry="2"
        fill="none" stroke="#666" stroke-width="1.2"/>

  <circle cx="575" cy="166" r="11" fill="#ffffff" stroke="#444" stroke-width="2.5"/>
  <text x="575" y="170" text-anchor="middle" class="pin-num">4</text>

  <circle cx="610" cy="166" r="11" fill="#ffffff" stroke="#d63030" stroke-width="2.5"/>
  <text x="610" y="170" text-anchor="middle" class="pin-num" fill="#8b0000">3</text>

  <circle cx="645" cy="166" r="11" fill="#ffffff" stroke="#888" stroke-width="2.5"/>
  <text x="645" y="170" text-anchor="middle" class="pin-num" fill="#555">2</text>

  <circle cx="680" cy="166" r="11" fill="#ffffff" stroke="#d49000" stroke-width="2.5"/>
  <text x="680" y="170" text-anchor="middle" class="pin-num" fill="#8b6200">1</text>

  <text x="575" y="216" text-anchor="middle" class="pin-label">GND</text>
  <text x="575" y="232" text-anchor="middle" class="color-label" fill="#444">czarny</text>
  <text x="610" y="216" text-anchor="middle" class="pin-label">5V</text>
  <text x="610" y="232" text-anchor="middle" class="color-label" fill="#8b0000">czerw.</text>
  <text x="645" y="216" text-anchor="middle" class="pin-label">A1</text>
  <text x="645" y="232" text-anchor="middle" class="color-label" fill="#555">szary</text>
  <text x="680" y="216" text-anchor="middle" class="pin-label">A0</text>
  <text x="680" y="232" text-anchor="middle" class="color-label" fill="#8b6200">żółty</text>

  <text x="625" y="260" text-anchor="middle" class="note">L4 → A0 · L5 → A1</text>
  <text x="625" y="278" text-anchor="middle" class="note">dwa niezależne kanały analog</text>
  <text x="625" y="296" text-anchor="middle" class="note">12-bit ADC (wszystkie płytki)</text>

  <!-- ============ SEKCJA 2: TABELA UART ============ -->
  <text x="40" y="355" class="section">Port 1 · UART — okablowanie od strony płytki</text>

  <rect x="40" y="365" width="720" height="28" fill="#e8e8e8" stroke="#666" stroke-width="0.8"/>
  <text x="60" y="383" class="cell-header">Pin · kolor</text>
  <text x="200" y="383" class="cell-header">Funkcja</text>
  <text x="310" y="383" class="cell-header">RP2040-Zero</text>
  <text x="460" y="383" class="cell-header">ESP32-S3-Zero</text>
  <text x="610" y="383" class="cell-header">ESP32-C3-Zero</text>

  <rect x="40" y="393" width="720" height="22" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <circle cx="52" cy="404" r="5" fill="#ffffff" stroke="#444" stroke-width="1.5"/>
  <text x="65" y="408" class="cell">czarny (pin 4)</text>
  <text x="200" y="408" class="cell">GND</text>
  <text x="310" y="408" class="cell">GND · pozycja L2</text>
  <text x="460" y="408" class="cell">GND · pozycja L2</text>
  <text x="610" y="408" class="cell">GND · pozycja L2</text>

  <rect x="40" y="415" width="720" height="22" fill="#fafafa" stroke="#ccc" stroke-width="0.5"/>
  <circle cx="52" cy="426" r="5" fill="#ffffff" stroke="#d63030" stroke-width="1.5"/>
  <text x="65" y="430" class="cell">czerwony (pin 3)</text>
  <text x="200" y="430" class="cell">5V</text>
  <text x="310" y="430" class="cell">5V · pozycja L1</text>
  <text x="460" y="430" class="cell">5V · pozycja L1</text>
  <text x="610" y="430" class="cell">5V · pozycja L1</text>

  <rect x="40" y="437" width="720" height="22" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <circle cx="52" cy="448" r="5" fill="#ffffff" stroke="#888" stroke-width="1.5"/>
  <text x="65" y="452" class="cell">szary (pin 2)</text>
  <text x="200" y="452" class="cell">TX</text>
  <text x="310" y="452" class="cell">GP0 · R1</text>
  <text x="460" y="452" class="cell">GP43 (TX) · R1</text>
  <text x="610" y="452" class="cell">GP21 · R1</text>

  <rect x="40" y="459" width="720" height="22" fill="#fafafa" stroke="#ccc" stroke-width="0.5"/>
  <circle cx="52" cy="470" r="5" fill="#ffffff" stroke="#d49000" stroke-width="1.5"/>
  <text x="65" y="474" class="cell">żółty (pin 1)</text>
  <text x="200" y="474" class="cell">RX</text>
  <text x="310" y="474" class="cell">GP1 · R2</text>
  <text x="460" y="474" class="cell">GP44 (RX) · R2</text>
  <text x="610" y="474" class="cell">GP20 · R2</text>

  <!-- ============ SEKCJA 3: TABELA I2C ============ -->
  <text x="40" y="510" class="section">Port 2 · I2C — okablowanie od strony płytki</text>

  <rect x="40" y="520" width="720" height="28" fill="#e8e8e8" stroke="#666" stroke-width="0.8"/>
  <text x="60" y="538" class="cell-header">Pin · kolor</text>
  <text x="200" y="538" class="cell-header">Funkcja</text>
  <text x="310" y="538" class="cell-header">RP2040-Zero</text>
  <text x="460" y="538" class="cell-header">ESP32-S3-Zero</text>
  <text x="610" y="538" class="cell-header">ESP32-C3-Zero</text>

  <rect x="40" y="548" width="720" height="22" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <circle cx="52" cy="559" r="5" fill="#ffffff" stroke="#444" stroke-width="1.5"/>
  <text x="65" y="563" class="cell">czarny (pin 4)</text>
  <text x="200" y="563" class="cell">GND</text>
  <text x="310" y="563" class="cell">GND · pozycja L2</text>
  <text x="460" y="563" class="cell">GND · pozycja L2</text>
  <text x="610" y="563" class="cell">GND · pozycja L2</text>

  <rect x="40" y="570" width="720" height="22" fill="#fafafa" stroke="#ccc" stroke-width="0.5"/>
  <circle cx="52" cy="581" r="5" fill="#ffffff" stroke="#d63030" stroke-width="1.5"/>
  <text x="65" y="585" class="cell">czerwony (pin 3)</text>
  <text x="200" y="585" class="cell">5V</text>
  <text x="310" y="585" class="cell">5V · pozycja L1</text>
  <text x="460" y="585" class="cell">5V · pozycja L1</text>
  <text x="610" y="585" class="cell">5V · pozycja L1</text>

  <rect x="40" y="592" width="720" height="22" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <circle cx="52" cy="603" r="5" fill="#ffffff" stroke="#888" stroke-width="1.5"/>
  <text x="65" y="607" class="cell">szary (pin 2)</text>
  <text x="200" y="607" class="cell">SDA</text>
  <text x="310" y="607" class="cell">GP4 · L8</text>
  <text x="460" y="607" class="cell">GP5 · L8</text>
  <text x="610" y="607" class="cell">GP4 · L8</text>

  <rect x="40" y="614" width="720" height="22" fill="#fafafa" stroke="#ccc" stroke-width="0.5"/>
  <circle cx="52" cy="625" r="5" fill="#ffffff" stroke="#d49000" stroke-width="1.5"/>
  <text x="65" y="629" class="cell">żółty (pin 1)</text>
  <text x="200" y="629" class="cell">SCL</text>
  <text x="310" y="629" class="cell">GP5 · L9</text>
  <text x="460" y="629" class="cell">GP6 · L9</text>
  <text x="610" y="629" class="cell">GP5 · L9</text>

  <!-- ============ SEKCJA 4: TABELA A/D ============ -->
  <text x="40" y="665" class="section">Port 3 · A/D — okablowanie od strony płytki</text>

  <rect x="40" y="675" width="720" height="28" fill="#e8e8e8" stroke="#666" stroke-width="0.8"/>
  <text x="60" y="693" class="cell-header">Pin · kolor</text>
  <text x="200" y="693" class="cell-header">Funkcja</text>
  <text x="310" y="693" class="cell-header">RP2040-Zero</text>
  <text x="460" y="693" class="cell-header">ESP32-S3-Zero</text>
  <text x="610" y="693" class="cell-header">ESP32-C3-Zero</text>

  <rect x="40" y="703" width="720" height="22" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <circle cx="52" cy="714" r="5" fill="#ffffff" stroke="#444" stroke-width="1.5"/>
  <text x="65" y="718" class="cell">czarny (pin 4)</text>
  <text x="200" y="718" class="cell">GND</text>
  <text x="310" y="718" class="cell">GND · pozycja L2</text>
  <text x="460" y="718" class="cell">GND · pozycja L2</text>
  <text x="610" y="718" class="cell">GND · pozycja L2</text>

  <rect x="40" y="725" width="720" height="22" fill="#fafafa" stroke="#ccc" stroke-width="0.5"/>
  <circle cx="52" cy="736" r="5" fill="#ffffff" stroke="#d63030" stroke-width="1.5"/>
  <text x="65" y="740" class="cell">czerwony (pin 3)</text>
  <text x="200" y="740" class="cell">5V</text>
  <text x="310" y="740" class="cell">5V · pozycja L1</text>
  <text x="460" y="740" class="cell">5V · pozycja L1</text>
  <text x="610" y="740" class="cell">5V · pozycja L1</text>

  <rect x="40" y="747" width="720" height="22" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <circle cx="52" cy="758" r="5" fill="#ffffff" stroke="#888" stroke-width="1.5"/>
  <text x="65" y="762" class="cell">szary (pin 2)</text>
  <text x="200" y="762" class="cell">A1</text>
  <text x="310" y="762" class="cell">GP28 · L5</text>
  <text x="460" y="762" class="cell">GP2 · L5</text>
  <text x="610" y="762" class="cell">GP1 · L5</text>

  <rect x="40" y="769" width="720" height="22" fill="#fafafa" stroke="#ccc" stroke-width="0.5"/>
  <circle cx="52" cy="780" r="5" fill="#ffffff" stroke="#d49000" stroke-width="1.5"/>
  <text x="65" y="784" class="cell">żółty (pin 1)</text>
  <text x="200" y="784" class="cell">A0</text>
  <text x="310" y="784" class="cell">GP29 · L4</text>
  <text x="460" y="784" class="cell">GP1 · L4</text>
  <text x="610" y="784" class="cell">GP0 · L4</text>

  <!-- ============ STOPKA ============ -->
  <text x="400" y="810" text-anchor="middle" class="note">Standard M5Stack Atom HY2.0 · pin 1 (żółty) po prawej patrząc od frontu obudowy</text>
</svg>
