sentence=Minimal C bytecode virtual machine for Arduino — run C-like scripts dynamically via MQTT/OTA.
paragraph=Stack-based VM that executes .mbc bytecode compiled from a C-like language subset. Scripts are uploaded at runtime without reflashing. Native C++ functions (GPIO, MQTT, sensors) are callable from scripts. Designed for ESP32 with ~4 KB RAM overhead.
